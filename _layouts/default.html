<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body class="{{ layout.body_class | default: '' }}">

    <a class="skip-link" href="#main-content">Skip to main content</a>

    {%- include header.html -%}

    <main class="page-content" id="main-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {%- include footer.html -%}

  </body>

</html>
